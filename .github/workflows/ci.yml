name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    strategy:
      matrix:
        service: [inventory-service, payment-service]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: snok/install-poetry@v1
      - run: poetry install
      - run: poetry run ruff check .
      - run: poetry run ruff format --check .
      - run: printf 'REDIS_HOST=localhost\nREDIS_PASSWORD=dummy\nREDIS_PORT=6379\n' > .env
      - run: poetry show httpx
      - run: poetry run pytest -v

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install mkdocs
        run: pip install mkdocs mkdocs-material
      - name: Build inventory docs
        run: mkdocs build --strict -f docs/mkdocs.yml
        working-directory: inventory-service
      - name: Build payment docs
        run: mkdocs build --strict -f docs/mkdocs.yml
        working-directory: payment-service
